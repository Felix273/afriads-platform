services:
  - type: web
    name: afriads-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://fentech.co.ke,https://www.fentech.co.ke,http://localhost:3000,http://localhost:3001,http://localhost:3010
      - key: BASE_URL
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: MPESA_ENVIRONMENT
        value: sandbox
      - key: MPESA_BASE_URL
        value: https://sandbox.safaricom.co.ke
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_BUSINESS_SHORT_CODE
        value: "174379"
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_TRANSACTION_TYPE
        value: CustomerPayBillOnline
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: MPESA_ACCOUNT_REFERENCE_PREFIX
        value: AFRIADS
